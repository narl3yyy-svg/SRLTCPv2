name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build desktop (linux-x86_64)
        run: |
          ./scripts/build-desktop.sh
          ls -lh dist/srltcp-desktop-linux-x86_64
          file dist/srltcp-desktop-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x86_64
          path: dist/srltcp-desktop-linux-x86_64

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build desktop (macos-aarch64 + macos-x86_64)
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release -p srltcp-desktop
          cargo build --release -p srltcp-desktop --target x86_64-apple-darwin
          mkdir -p dist
          cp target/release/srltcp-desktop dist/srltcp-desktop-macos-aarch64
          cp target/x86_64-apple-darwin/release/srltcp-desktop dist/srltcp-desktop-macos-x86_64
          chmod +x dist/srltcp-desktop-macos-aarch64 dist/srltcp-desktop-macos-x86_64
          ls -lh dist/srltcp-desktop-macos-*

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: dist/srltcp-desktop-macos-*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build desktop (windows-x86_64)
        shell: pwsh
        run: |
          cargo build --release -p srltcp-desktop
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\srltcp-desktop.exe dist\srltcp-desktop-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x86_64
          path: dist/srltcp-desktop-windows-x86_64.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --licenses < <(echo y; echo y; echo y; echo y; echo y) || true
          sdkmanager "platform-tools" "platforms;android-35"
          for attempt in 1 2 3; do
            sdkmanager "ndk;27.2.12479018" && break
            echo "NDK install attempt $attempt failed, retrying..."
            sleep 15
          done
          test -d "$ANDROID_HOME/ndk/27.2.12479018" || test -d "$ANDROID_NDK_HOME"

      - name: Build APK
        run: ./scripts/build-android.sh --no-cleanup

      - name: Stage APK
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cp "dist/SRLTCPv2-${VERSION}.apk" "dist/SRLTCPv2-release.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/SRLTCPv2-release.apk

  publish:
    needs: [build-linux, build-macos, build-windows, build-android]
    if: ${{ !cancelled() && (needs.build-linux.result == 'success' || needs.build-macos.result == 'success' || needs.build-windows.result == 'success' || needs.build-android.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          shopt -s nullglob globstar
          for f in artifacts/**/* artifacts/*; do
            [[ -f "$f" ]] || continue
            cp -f "$f" release/
          done
          if [[ -f release/SRLTCPv2-release.apk ]]; then
            mv release/SRLTCPv2-release.apk "release/SRLTCPv2-${VERSION}.apk"
          fi
          ls -la release/
          test -n "$(ls -A release/ 2>/dev/null)" || { echo "No release assets found"; exit 1; }

      - uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## SRLTCP ${{ github.ref_name }}

            Production-hardened private P2P messaging — **no compiler required**.

            ### Highlights (v0.3.0)
            - Persistent long-term identity (desktop + Android)
            - Smaller desktop binaries (~14 MB Linux, stripped + LTO)
            - Slim arm64 Android release APK
            - QR + SAS trust gate; Double Ratchet E2EE for chat

            ### Desktop
            ```bash
            git clone https://github.com/narl3yyy-svg/SRLTCPv2.git
            cd SRLTCPv2
            ./run.sh          # Linux/macOS — auto-downloads this release
            run.bat           # Windows
            ```

            ### Android
            ```bash
            adb install SRLTCPv2-0.3.1.apk
            ```
            Default APK is **arm64-v8a** (most modern phones).

            ### Assets
            | Platform | Asset |
            |----------|-------|
            | Linux x86_64 | `srltcp-desktop-linux-x86_64` |
            | macOS Apple Silicon | `srltcp-desktop-macos-aarch64` |
            | macOS Intel | `srltcp-desktop-macos-x86_64` |
            | Windows x86_64 | `srltcp-desktop-windows-x86_64.exe` |
            | Android (arm64) | `SRLTCPv2-0.3.1.apk` |

            See [SECURITY.md](https://github.com/narl3yyy-svg/SRLTCPv2/blob/main/docs/SECURITY.md) for residual risks.
          files: release/*