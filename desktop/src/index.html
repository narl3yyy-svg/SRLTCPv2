<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRLTCP v0.2.2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-icon">S</div>
        <div>
          <h1>SRLTCP</h1>
          <span class="version">v0.2.2</span>
        </div>
      </header>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-panel="identity">Identity</button>
        <button class="nav-btn" data-panel="connect">Connect</button>
        <button class="nav-btn" data-panel="peers">Peers</button>
      </nav>

      <div class="sidebar-panels">
        <section id="panel-identity" class="panel active">
          <h2>Your Identity</h2>
          <div class="qr-box"><code id="qr-payload">Loading…</code></div>
          <button class="btn secondary" id="copy-qr">Copy QR Payload</button>
          <div id="sas-display" class="sas-display hidden"></div>
        </section>

        <section id="panel-connect" class="panel">
          <h2>Connect</h2>
          <div class="form-group">
            <label>Serial Port</label>
            <select id="serial-port"></select>
          </div>
          <button class="btn" id="connect-serial">Connect Serial</button>
          <div class="form-group">
            <label>QUIC Address</label>
            <input type="text" id="quic-addr" placeholder="192.168.1.10:9473" />
          </div>
          <button class="btn" id="connect-quic">Connect LAN/WAN</button>
          <hr class="divider" />
          <h2>Verify Peer</h2>
          <input type="text" id="remote-qr" placeholder="Paste peer QR payload" />
          <button class="btn secondary" id="verify-peer">Handshake + SAS</button>
        </section>

        <section id="panel-peers" class="panel">
          <div class="panel-header-row">
            <h2>Peers <span id="peer-count" class="badge">0</span></h2>
            <button class="btn-sm" id="refresh-peers" title="Refresh">↻</button>
          </div>
          <ul id="peer-list" class="peer-list"></ul>
          <p id="no-peers" class="hint">Connect via QUIC or serial to add peers.</p>
        </section>
      </div>
    </aside>

    <!-- ── Main chat area ──────────────────────────── -->
    <main class="chat-area">
      <header class="chat-header">
        <div class="chat-header-info">
          <h2 id="chat-title">Select a peer</h2>
          <p id="chat-subtitle" class="subtitle">Connect or select a peer to start</p>
          <div id="call-status" class="call-banner hidden"></div>
        </div>
        <div class="toolbar">
          <button class="tool-btn" id="send-file-btn" disabled title="Send file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            <span>File</span>
          </button>
          <button class="tool-btn" id="voice-call-btn" disabled title="Voice call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            <span>Voice</span>
          </button>
          <button class="tool-btn" id="video-call-btn" disabled title="Video call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <span>Video</span>
          </button>
          <button class="tool-btn danger hidden" id="end-call-btn" title="End call">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
            <span>End</span>
          </button>
          <button class="tool-btn" id="disconnect-btn" disabled title="Disconnect peer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          </button>
          <div class="status-pill" id="status">Connecting…</div>
        </div>
      </header>

      <div id="peer-chips" class="peer-chips hidden"></div>

      <div id="transfers-panel" class="transfers-panel hidden"></div>

      <div id="messages" class="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🔒</div>
          <p>Secure P2P Messaging</p>
          <span>Connect to a peer via QUIC or serial, then select them to chat</span>
        </div>
      </div>

      <footer class="composer">
        <input type="text" id="message-input" placeholder="Type a message…" disabled />
        <button class="btn send-btn" id="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </footer>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
